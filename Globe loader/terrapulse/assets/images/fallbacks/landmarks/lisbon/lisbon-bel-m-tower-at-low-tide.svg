<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400" role="img" aria-label="Belém Tower at low tide">
  <defs>
    <linearGradient id="sky" x1="12%" y1="0%" x2="88%" y2="100%">
      <stop offset="0%" stop-color="#faf7f1"/>
      <stop offset="48%" stop-color="#e7edf1"/>
      <stop offset="100%" stop-color="#6f99b8" stop-opacity="0.72"/>
    </linearGradient>
    <linearGradient id="ground" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e7edf1"/>
      <stop offset="65%" stop-color="#6f99b8" stop-opacity="0.76"/>
      <stop offset="100%" stop-color="#2f3b46" stop-opacity="0.22"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#6f99b8" stop-opacity="0.46"/>
      <stop offset="100%" stop-color="#6f99b8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wash" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2f3b46" stop-opacity="0.24"/>
      <stop offset="46%" stop-color="#6f99b8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.3"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="2" seed="780"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.065"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#sky)"/>
  <circle cx="443" cy="59" r="112" fill="url(#glow)" filter="url(#soft)"/>
  <path d="M0 243 C 108 147, 204 339, 300 107 S 492 339, 600 182 L 600 400 L 0 400 Z" fill="url(#ground)" opacity="0.82"/>
  <path d="M0 288 C 132 248, 270 320, 402 272 S 528 240, 600 280 L 600 400 L 0 400 Z" fill="#2f3b46" opacity="0.1"/>
  <rect width="100%" height="100%" fill="url(#wash)" opacity="0.72"/>
  <rect width="100%" height="100%" filter="url(#grain)" opacity="1"/>
  <rect x="24" y="20" width="552" height="360" rx="14" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="2"/>
</svg>