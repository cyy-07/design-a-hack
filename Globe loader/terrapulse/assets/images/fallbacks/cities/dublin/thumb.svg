<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200" role="img" aria-label="Dublin">
  <defs>
    <linearGradient id="sky" x1="12%" y1="0%" x2="88%" y2="100%">
      <stop offset="0%" stop-color="#f6f5f7"/>
      <stop offset="48%" stop-color="#e3e0e8"/>
      <stop offset="100%" stop-color="#8b80b3" stop-opacity="0.72"/>
    </linearGradient>
    <linearGradient id="ground" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e3e0e8"/>
      <stop offset="65%" stop-color="#8b80b3" stop-opacity="0.76"/>
      <stop offset="100%" stop-color="#33303f" stop-opacity="0.22"/>
