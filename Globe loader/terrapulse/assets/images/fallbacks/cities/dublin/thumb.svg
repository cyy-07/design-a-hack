    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#8b80b3" stop-opacity="0.46"/>
      <stop offset="100%" stop-color="#8b80b3" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wash" x1="0%" y1="100%" x2="100%" y2="0%">
